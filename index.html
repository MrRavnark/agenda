<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agenda Espaço do Pensar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-logo" src="assets/logo-espaco-do-pensar.jpeg" alt="Espaço do Pensar" />
          <div>
            <p class="eyebrow">Espaço do Pensar</p>
            <h1>Agenda clínica</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <div class="sync-status" id="sync-status" data-state="local">Local</div>
          <button class="new-appointment-button" type="button" id="new-appointment">
            <span aria-hidden="true">+</span>
            Novo atendimento
          </button>

          <div class="date-controls" aria-label="Navegação de datas">
            <button class="icon-button" type="button" id="previous-date" title="Voltar">
              <span aria-hidden="true">‹</span>
            </button>
            <button class="today-button" type="button" id="today-date">Hoje</button>
            <button class="icon-button" type="button" id="next-date" title="Avançar">
              <span aria-hidden="true">›</span>
            </button>
          </div>
        </div>
      </header>

      <main class="workspace">
        <aside class="schedule-form-panel is-hidden" aria-label="Cadastro de atendimento" aria-modal="true">
          <div class="panel-header">
            <h2 id="form-title">Novo atendimento</h2>
            <div class="panel-actions">
              <button class="ghost-button small" type="button" id="clear-form">Limpar</button>
              <button class="ghost-button small" type="button" id="close-form">Fechar</button>
            </div>
          </div>

          <form id="appointment-form" autocomplete="off">
            <input type="hidden" id="appointment-id" />

            <label>
              <span>Paciente</span>
              <input id="patient" name="patient" type="text" required placeholder="Nome do paciente" />
            </label>

            <label>
              <span>Psicóloga</span>
              <input id="psychologist" name="psychologist" type="text" required placeholder="Nome da profissional" />
            </label>

            <div class="field-grid">
              <label>
                <span>Data</span>
                <input id="date" name="date" type="date" required />
              </label>

              <label>
                <span>Sala</span>
                <select id="room" name="room" required></select>
              </label>
            </div>

            <div class="field-grid">
              <label>
                <span>Início</span>
                <input id="start" name="start" type="time" min="07:00" max="21:00" step="3600" required />
              </label>

              <label>
                <span>Término</span>
                <input id="end" name="end" type="time" min="08:00" max="22:00" step="3600" required />
              </label>
            </div>

            <label>
              <span>Observações</span>
              <textarea id="notes" name="notes" rows="3" placeholder="Opcional"></textarea>
            </label>

            <div class="form-feedback" id="form-feedback" role="status" aria-live="polite"></div>

            <div class="form-actions-row">
              <button class="primary-button" type="submit" id="submit-appointment">Salvar atendimento</button>
              <button class="ghost-button delete-button is-hidden" type="button" id="delete-appointment">Excluir</button>
            </div>
          </form>
        </aside>

        <section class="schedule-area" aria-label="Painel da agenda">
          <div class="schedule-toolbar">
            <div>
              <p class="current-period" id="current-period"></p>
              <div class="summary-strip" id="summary-strip"></div>
            </div>

            <div class="schedule-tools">
              <label class="room-filter">
                <span>Sala</span>
                <select id="filter-room" name="filter-room">
                  <option value="all">Todas</option>
                </select>
              </label>

              <div class="view-tabs" role="tablist" aria-label="Modo de visualização">
                <button type="button" class="tab-button active" data-view="day" role="tab" aria-selected="true">
                  Dia
                </button>
                <button type="button" class="tab-button" data-view="week" role="tab" aria-selected="false">
                  Semana
                </button>
                <button type="button" class="tab-button" data-view="month" role="tab" aria-selected="false">
                  Mês
                </button>
                <button type="button" class="tab-button" data-view="rooms" role="tab" aria-selected="false">
                  Salas
                </button>
              </div>
            </div>
          </div>

          <div class="schedule-content" id="schedule-content"></div>
        </section>
      </main>
    </div>

    <template id="appointment-template">
      <article class="appointment-card">
        <div class="appointment-main">
          <p class="appointment-time"></p>
          <h3 class="appointment-patient"></h3>
          <p class="appointment-meta"></p>
        </div>
        <div class="appointment-actions">
          <button type="button" class="card-action edit" title="Editar atendimento">Editar</button>
          <button type="button" class="card-action delete" title="Excluir atendimento">Excluir</button>
        </div>
      </article>
    </template>

    <button class="fab-button" id="fab-new-appointment" title="Novo atendimento">
      <span>+</span>
    </button>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
