<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Agenda Espaço do Pensar</title>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-logo" src="assets/logo-espaco-do-pensar.jpeg" alt="Espaço do Pensar" />
          <div>
            <p class="brand-context">Espaço do Pensar</p>
            <h1>Agenda clínica</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <div class="sync-status" id="sync-status" data-state="local" role="status" aria-live="polite">Local</div>
          <button
            class="new-appointment-button"
            type="button"
            id="new-appointment"
            aria-controls="appointment-form-panel"
            aria-expanded="false"
          >
            <span aria-hidden="true">+</span>
            Novo atendimento
          </button>

          <div class="date-controls" aria-label="Navegação de datas">
            <button class="icon-button" type="button" id="previous-date" title="Voltar" aria-label="Dia anterior">
              <span aria-hidden="true">‹</span>
            </button>
            <button class="today-button" type="button" id="today-date" aria-label="Ir para hoje">Hoje</button>
            <button class="icon-button" type="button" id="next-date" title="Avançar" aria-label="Próximo dia">
              <span aria-hidden="true">›</span>
            </button>
          </div>
        </div>
      </header>

      <main class="workspace">
        <aside
          class="schedule-form-panel is-hidden"
          id="appointment-form-panel"
          aria-labelledby="form-title"
          aria-hidden="true"
          tabindex="-1"
        >
          <div class="panel-header">
            <h2 id="form-title">Novo atendimento</h2>
            <div class="panel-actions">
              <button class="ghost-button small" type="button" id="clear-form">Limpar</button>
              <button class="ghost-button small" type="button" id="close-form" aria-label="Fechar formulário">
                Fechar
              </button>
            </div>
          </div>

          <form id="appointment-form" autocomplete="off">
            <input type="hidden" id="appointment-id" />

            <label>
              <span>Paciente</span>
              <input id="patient" name="patient" type="text" list="patient-options" required placeholder="Nome do paciente" />
              <datalist id="patient-options"></datalist>
            </label>

            <label>
              <span>Psicólogo(a)</span>
              <input
                id="psychologist"
                name="psychologist"
                type="text"
                list="psychologist-options"
                placeholder="Nome do(a) profissional, se definido"
              />
              <datalist id="psychologist-options"></datalist>
            </label>

            <div class="field-grid">
              <label>
                <span>Data</span>
                <input id="date" name="date" type="date" required />
              </label>

              <label>
                <span>Sala</span>
                <select id="room" name="room" required></select>
              </label>
            </div>

            <div class="field-grid">
              <label>
                <span>Início</span>
                <input id="start" name="start" type="time" min="07:00" max="21:00" step="3600" required />
              </label>

              <label>
                <span>Término</span>
                <input id="end" name="end" type="time" min="08:00" max="22:00" step="3600" required />
              </label>
            </div>

            <label>
              <span>Observações</span>
              <textarea id="notes" name="notes" rows="3" placeholder="Opcional"></textarea>
            </label>

            <div class="form-feedback" id="form-feedback" role="status" aria-live="polite"></div>

            <div class="form-actions-row">
              <button class="primary-button" type="submit" id="submit-appointment">Salvar atendimento</button>
              <button class="ghost-button delete-button is-hidden" type="button" id="delete-appointment">Excluir</button>
            </div>
          </form>
        </aside>

        <section class="schedule-area" aria-label="Painel da agenda">
          <div class="schedule-toolbar">
            <div>
              <p class="current-period" id="current-period"></p>
              <div class="summary-strip" id="summary-strip"></div>
            </div>

            <div class="schedule-tools">
              <label class="toolbar-filter room-filter">
                <span>Sala</span>
                <select id="filter-room" name="filter-room">
                  <option value="all">Todas</option>
                </select>
              </label>

              <label class="toolbar-filter psychologist-filter">
                <span>Psicólogo(a)</span>
                <select id="filter-psychologist" name="filter-psychologist">
                  <option value="all">Todas</option>
                </select>
              </label>

              <div class="view-tabs" role="tablist" aria-label="Modo de visualização">
                <button
                  type="button"
                  class="tab-button active"
                  id="view-tab-day"
                  data-view="day"
                  role="tab"
                  aria-selected="true"
                  aria-controls="schedule-content"
                  tabindex="0"
                >
                  Dia
                </button>
                <button
                  type="button"
                  class="tab-button"
                  id="view-tab-week"
                  data-view="week"
                  role="tab"
                  aria-selected="false"
                  aria-controls="schedule-content"
                  tabindex="-1"
                >
                  Semana
                </button>
                <button
                  type="button"
                  class="tab-button"
                  id="view-tab-month"
                  data-view="month"
                  role="tab"
                  aria-selected="false"
                  aria-controls="schedule-content"
                  tabindex="-1"
                >
                  Mês
                </button>
                <button
                  type="button"
                  class="tab-button"
                  id="view-tab-rooms"
                  data-view="rooms"
                  role="tab"
                  aria-selected="false"
                  aria-controls="schedule-content"
                  tabindex="-1"
                >
                  Salas
                </button>
              </div>
            </div>
          </div>

          <div
            class="schedule-content"
            id="schedule-content"
            role="tabpanel"
            aria-labelledby="view-tab-day"
            tabindex="0"
          ></div>
        </section>
      </main>
    </div>

    <template id="appointment-template">
      <article class="appointment-card">
        <div class="appointment-main">
          <p class="appointment-time"></p>
          <h3 class="appointment-patient"></h3>
          <p class="appointment-meta"></p>
        </div>
        <div class="appointment-actions">
          <button type="button" class="card-action edit" title="Editar atendimento">Editar</button>
          <button type="button" class="card-action delete" title="Excluir atendimento">Excluir</button>
        </div>
      </article>
    </template>

    <button
      class="fab-button"
      id="fab-new-appointment"
      type="button"
      title="Novo atendimento"
      aria-label="Novo atendimento"
      aria-controls="appointment-form-panel"
      aria-expanded="false"
    >
      <span aria-hidden="true">+</span>
      <span class="fab-label">Novo</span>
    </button>

    <script src="config.js"></script>
    <script src="directory.js?v=1"></script>
    <script src="app.js?v=3"></script>
  </body>
</html>
